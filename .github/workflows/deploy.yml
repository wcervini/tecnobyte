name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Sync to VPS
        uses: burnett01/rsync-deployments@8.0
        with:
          switches: -avz --delete --exclude='.env*'
          path: dist/
          remote_path: /home/ubuntu/ts/
          remote_host: 164.132.111.83
          remote_user: ubuntu
          remote_key: ${{ secrets.DEPLOY_KEY }}
